name: auto_start
root: ~/

windows:
  - detectors:
      layout: tiled
      panes:
        - pane1:
          - docker start 4e5591515d47
          - sleep 3
          - docker exec -it 4e5591515d47 bash -lc "pkill -f component_container_mt || true; pkill -f late_fusion_node || true; pkill -f ros2 || true"
          - sleep 3

        - pane2:
          - sleep 6
          - docker exec -it 4e5591515d47 bash -lc "mkdir -p /root/.ros/log/latest && source /opt/ros/jazzy/setup.bash && source /ros2_ws/install/setup.bash && ros2 launch ros2_yolos_cpp detector2.launch.py model_path:=/ros2_ws/V2x/ros2_yolos_cpp/yolov8n.onnx labels_path:=/ros2_ws/V2x/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_2/image" 

        - pane3:
